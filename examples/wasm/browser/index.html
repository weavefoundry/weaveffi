<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WeaveFFI WASM Calculator</title>
    <style>
      body {
        color: #1f2937;
        font-family: system-ui, sans-serif;
        line-height: 1.5;
        margin: 2rem auto;
        max-width: 44rem;
        padding: 0 1rem;
      }

      section {
        border: 1px solid #d1d5db;
        border-radius: 0.5rem;
        margin: 1rem 0;
        padding: 1rem;
      }

      label {
        display: block;
        font-weight: 600;
        margin-top: 0.75rem;
      }

      input,
      button {
        font: inherit;
        margin-top: 0.25rem;
        padding: 0.4rem 0.55rem;
      }

      output,
      #status {
        display: block;
        margin-top: 0.75rem;
      }

      .error {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>WeaveFFI WASM Calculator</h1>
      <p>
        This page loads the generated <code>weaveffi_wasm.js</code> wrapper in a
        worker and calls the calculator sample compiled to WebAssembly.
      </p>
      <p id="status">Starting worker...</p>

      <section aria-labelledby="add-heading">
        <h2 id="add-heading">Add</h2>
        <label for="add-a">First number</label>
        <input id="add-a" type="number" value="2" />
        <label for="add-b">Second number</label>
        <input id="add-b" type="number" value="3" />
        <button id="add-button" type="button">Add</button>
        <output id="add-output" for="add-a add-b"></output>
      </section>

      <section aria-labelledby="echo-heading">
        <h2 id="echo-heading">Echo</h2>
        <label for="echo-input">Message</label>
        <input id="echo-input" type="text" value="Hello from WeaveFFI" />
        <button id="echo-button" type="button">Echo</button>
        <output id="echo-output" for="echo-input"></output>
      </section>

      <section aria-labelledby="error-heading">
        <h2 id="error-heading">Error Handling</h2>
        <p>Click the button to call <code>div(1, 0)</code> and show the native error.</p>
        <button id="error-button" type="button">Trigger divide-by-zero</button>
        <output id="error-output" class="error"></output>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>

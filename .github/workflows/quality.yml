name: Quality

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: cargo deny check
        # `cargo deny check` exits non-zero only when a check produces errors,
        # so advisory warnings (yanked, unmaintained) are surfaced but do not
        # block the build.
        run: cargo deny check

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        # Ignored advisories:
        #   RUSTSEC-2023-0057 / RUSTSEC-2023-0058 — apply to the crates.io
        #     `inventory` crate; our `samples/inventory` shares the name but
        #     is an unrelated, unpublished sample cdylib.
        #   RUSTSEC-2026-0097 — `rand 0.8.5` unsound `rng()` path, pulled in
        #     transitively via `tera`. Not reachable from our code; remove
        #     once tera bumps its rand dep.
        run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2023-0057 \
            --ignore RUSTSEC-2023-0058 \
            --ignore RUSTSEC-2026-0097

  machete:
    name: cargo-machete
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-machete
        run: cargo install cargo-machete --locked

      - name: cargo machete
        run: cargo machete --with-metadata

  doc:
    name: rustdoc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D rustdoc::all -D rustdoc::missing_crate_level_docs"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo doc
        run: cargo doc --workspace --no-deps

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    # Threshold is informational while we establish a baseline.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate lcov coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false

  docs-linkcheck:
    name: docs link check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install mdbook + mdbook-linkcheck
        run: |
          cargo install mdbook --locked
          cargo install mdbook-linkcheck --locked

      - name: Validate docs links
        run: scripts/check-links.sh

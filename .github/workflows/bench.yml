name: Bench

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  bench:
    name: cargo bench
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true

      # PR smoke run: criterion's `--test` mode executes every benchmark
      # body exactly once, with no warmup or sampling. This catches
      # panics and stale fixtures (clippy already compile-checks the
      # harnesses on PRs, but only execution catches runtime failures)
      # without spending minutes collecting numbers that are too noisy
      # to compare on shared runners.
      - name: Run cargo bench (smoke)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          cargo bench -p weaveffi-core --bench codegen_bench -- --test
          cargo bench -p weaveffi-cli  --bench generate_bench -- --test

      # Full sampled run on main; the uploaded artifact is the historical
      # record of the numbers.
      - name: Run cargo bench
        if: github.event_name == 'push'
        # The two criterion harnesses (`weaveffi-core` and `weaveffi-cli`)
        # accept `--noplot`; the workspace `cargo bench --workspace` flag
        # also fans out to the default `libtest` harness in every other
        # crate, which rejects `--noplot`, so we invoke each criterion
        # bench explicitly. `--noplot` skips the gnuplot/plotters HTML
        # reports so the artifact stays small (a few KB of text instead
        # of MBs of SVG plots).
        run: |
          set -euo pipefail
          {
            cargo bench -p weaveffi-core --bench codegen_bench -- --noplot
            cargo bench -p weaveffi-cli  --bench generate_bench -- --noplot
          } 2>&1 | tee bench.txt

      - name: Upload bench results
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench.txt
          if-no-files-found: error
          retention-days: 90

name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Build workspace (debug)
        run: cargo build --workspace --all-targets

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run unit tests
        run: cargo test --workspace --all-features --no-fail-fast

      - name: Install cargo-insta
        run: cargo install --locked cargo-insta

      - name: Verify generator snapshots
        run: cargo insta test --workspace --check

      - name: Build CLI (release)
        run: cargo build -p weaveffi-cli --release

      - name: Generate bindings from calculator IDL
        if: runner.os != 'Windows'
        run: target/release/weaveffi generate samples/calculator/calculator.yml -o generated

      - name: Build calculator cdylib (debug)
        if: runner.os != 'Windows'
        run: cargo build -p calculator

      - name: Build contacts cdylib (debug)
        if: runner.os != 'Windows'
        run: cargo build -p contacts

      - name: Compile C example
        if: runner.os != 'Windows'
        run: cc -I generated/c examples/c/main.c -L target/debug -lcalculator -o c_example

      - name: Run C example
        if: runner.os != 'Windows'
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            DYLD_LIBRARY_PATH=target/debug ./c_example
          else
            LD_LIBRARY_PATH=target/debug ./c_example
          fi

      - name: Build Node addon (debug)
        if: runner.os != 'Windows'
        run: cargo build -p weaveffi-node-addon

      - name: Place Node addon next to generated loader
        if: runner.os != 'Windows'
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            cp target/debug/libindex.dylib generated/node/index.node
          else
            cp target/debug/libindex.so generated/node/index.node
          fi

      - name: Smoke run Node example
        if: runner.os != 'Windows'
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            export DYLD_LIBRARY_PATH="$PWD/target/debug"
            export WEAVEFFI_LIB="$PWD/target/debug/libcalculator.dylib"
          else
            export LD_LIBRARY_PATH="$PWD/target/debug"
            export WEAVEFFI_LIB="$PWD/target/debug/libcalculator.so"
          fi
          node examples/node/main.mjs

      - name: Add wasm target
        if: runner.os != 'Windows'
        run: rustup target add wasm32-unknown-unknown

      - name: Build calculator wasm (release)
        if: runner.os != 'Windows'
        run: cargo build -p calculator --target wasm32-unknown-unknown --release

      - name: Install consumer toolchains (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ cmake python3 golang-go ruby-ffi unzip
          sudo apt-get install -y dotnet-sdk-8.0 || true
          curl -sLO https://github.com/JetBrains/kotlin/releases/download/v1.9.22/kotlin-compiler-1.9.22.zip
          unzip -q kotlin-compiler-1.9.22.zip -d "$HOME/.kotlin"
          echo "$HOME/.kotlin/kotlinc/bin" >> "$GITHUB_PATH"

      - name: Install consumer toolchains (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake go kotlin
          gem install --no-document --user-install ffi
          echo "$(ruby -e 'puts Gem.user_dir')/bin" >> "$GITHUB_PATH"

      - name: Set up Dart
        if: runner.os != 'Windows'
        uses: dart-lang/setup-dart@v1

      - name: Set up Swift (Linux)
        if: runner.os == 'Linux'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.10"

      - name: Run end-to-end consumer tests (Linux)
        if: runner.os == 'Linux'
        env:
          WEAVEFFI_LIB: ${{ github.workspace }}/target/debug/libcalculator.so
        run: bash examples/run_all.sh

      - name: Run end-to-end consumer tests (macOS)
        if: runner.os == 'macOS'
        env:
          WEAVEFFI_LIB: ${{ github.workspace }}/target/debug/libcalculator.dylib
        run: bash examples/run_all.sh

      - name: Run end-to-end consumer tests (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          ONLY: python
        run: |
          export WEAVEFFI_LIB="$GITHUB_WORKSPACE/target/debug/calculator.dll"
          export CONTACTS_LIB="$GITHUB_WORKSPACE/target/debug/contacts.dll"
          bash examples/run_all.sh

      - name: Verify weaveffi.schema.json is up to date
        if: runner.os == 'Linux'
        run: |
          target/release/weaveffi schema --format json-schema > weaveffi.schema.json.regenerated
          diff -u weaveffi.schema.json weaveffi.schema.json.regenerated

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        if: runner.os != 'Windows'
        with:
          name: weaveffi-cli-${{ runner.os }}
          path: target/release/weaveffi
          if-no-files-found: error
          retention-days: 7

      - name: Upload CLI artifact (Windows)
        uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: weaveffi-cli-Windows
          path: target/release/weaveffi.exe
          if-no-files-found: error
          retention-days: 7

  windows-e2e:
    name: Windows E2E
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true

      - name: Build CLI (release)
        run: cargo build -p weaveffi-cli --release

      - name: Build calculator cdylib (debug)
        run: cargo build -p calculator

      - name: Generate bindings from calculator IDL
        run: ./target/release/weaveffi.exe generate samples/calculator/calculator.yml -o generated

      - name: Verify generated bindings
        shell: pwsh
        run: |
          $expected = @(
            "generated/c/weaveffi.h",
            "generated/swift/Package.swift",
            "generated/node/types.d.ts",
            "generated/android/build.gradle",
            "generated/python/weaveffi/weaveffi.py",
            "generated/dotnet/WeaveFFI.cs",
            "generated/wasm/README.md"
          )
          $missing = @()
          foreach ($f in $expected) {
            if (!(Test-Path $f)) { $missing += $f }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing files: $($missing -join ', ')"
            exit 1
          }
          Write-Host "All expected generated files present"

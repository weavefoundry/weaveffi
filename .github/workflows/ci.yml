name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Build workspace (debug)
        run: cargo build --workspace --all-targets

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run unit tests
        run: cargo test --workspace --all-features --no-fail-fast

      - name: Install cargo-insta
        run: cargo install --locked cargo-insta

      - name: Verify generator snapshots
        run: cargo insta test --workspace --check

      - name: Build CLI (release)
        run: cargo build -p weaveffi-cli --release

      - name: Generate bindings from calculator IDL
        shell: bash
        run: |
          BIN=target/release/weaveffi
          [ "${{ runner.os }}" = "Windows" ] && BIN="${BIN}.exe"
          "$BIN" generate samples/calculator/calculator.yml -o generated

      - name: Build sample producer cdylibs (debug)
        run: cargo build -p calculator -p contacts -p kvstore

      - name: Add wasm target
        if: runner.os != 'Windows'
        run: rustup target add wasm32-unknown-unknown

      - name: Build calculator wasm (release)
        if: runner.os != 'Windows'
        run: cargo build -p calculator --target wasm32-unknown-unknown --release

      - name: Verify weaveffi.schema.json is up to date
        if: runner.os == 'Linux'
        run: |
          target/release/weaveffi schema --format json-schema > weaveffi.schema.json.regenerated
          diff -u weaveffi.schema.json weaveffi.schema.json.regenerated

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        if: runner.os != 'Windows'
        with:
          name: weaveffi-cli-${{ runner.os }}
          path: target/release/weaveffi
          if-no-files-found: error
          retention-days: 7

      - name: Upload CLI artifact (Windows)
        uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: weaveffi-cli-Windows
          path: target/release/weaveffi.exe
          if-no-files-found: error
          retention-days: 7

  conformance:
    # Correctness gate: every consumer binds through the *generated* wrappers and
    # asserts concrete results, so a backend that lowers a type wrong, drifts a
    # symbol, or skips a feature fails here. Covers contacts + events + kvstore
    # across C, C++, Python, Ruby, Dart, Go, Swift, .NET, Node, Kotlin, and
    # Wasm: the events lanes exercise listeners/callbacks + iterators, and the
    # kvstore lanes exercise interfaces (constructors, methods, async methods,
    # iterator methods, destroy), typed error domains, struct getters
    # (bytes/optional/list/map), builders, and eviction listeners; see
    # conformance/run.sh.
    name: Conformance harness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.10"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install consumer toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang g++ python3 golang-go ruby-ffi
          sudo snap install kotlin --classic

      - name: Run conformance harness
        run: bash conformance/run.sh

  windows-e2e:
    name: Windows E2E
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true

      - name: Build CLI (release)
        run: cargo build -p weaveffi-cli --release

      - name: Build calculator cdylib (debug)
        run: cargo build -p calculator

      - name: Generate bindings from calculator IDL
        run: ./target/release/weaveffi.exe generate samples/calculator/calculator.yml -o generated

      - name: Verify generated bindings
        shell: pwsh
        run: |
          $expected = @(
            "generated/c/weaveffi.h",
            "generated/swift/Package.swift",
            "generated/node/types.d.ts",
            "generated/android/build.gradle",
            "generated/python/calculator/weaveffi.py",
            "generated/dotnet/WeaveFFI.cs",
            "generated/wasm/README.md"
          )
          $missing = @()
          foreach ($f in $expected) {
            if (!(Test-Path $f)) { $missing += $f }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing files: $($missing -join ', ')"
            exit 1
          }
          Write-Host "All expected generated files present"

  android-ndk:
    name: Android NDK JNI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true

      - name: Install Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Add aarch64-linux-android Rust target
        run: rustup target add aarch64-linux-android

      - name: Build CLI (release)
        run: cargo build -p weaveffi-cli --release

      - name: Generate Android + C bindings for contacts
        run: |
          target/release/weaveffi generate samples/contacts/contacts.yml -o generated --target c
          target/release/weaveffi generate samples/contacts/contacts.yml -o generated --target android

      - name: Compile JNI shim with NDK clang
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          set -euxo pipefail
          CLANG="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"
          if [ ! -x "$CLANG" ]; then
            echo "expected NDK clang at $CLANG" >&2
            ls "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >&2
            exit 1
          fi
          "$CLANG" -shared -fPIC \
            -I generated/c \
            -Wl,--unresolved-symbols=ignore-all \
            -o libweaveffi_jni_test.so \
            generated/android/src/main/cpp/weaveffi_jni.c

      - name: Assert exported JNI symbols
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          set -euxo pipefail
          NM="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-nm"
          file libweaveffi_jni_test.so
          ldd libweaveffi_jni_test.so || true
          "$NM" -D --defined-only libweaveffi_jni_test.so > nm.out
          # The Android generator lowers each interface and record to its own
          # Kotlin class with `native*` externals, so the JNI exports are
          # namespaced per type: the ContactBook interface's constructor,
          # methods, and destroy hook plus the Contact record's accessors.
          for sym in \
              Java_com_weaveffi_ContactBook_nativeNew \
              Java_com_weaveffi_ContactBook_nativeAdd \
              Java_com_weaveffi_ContactBook_nativeCount \
              Java_com_weaveffi_ContactBook_nativeDestroy \
              Java_com_weaveffi_Contact_nativeGetId; do
            if ! grep -q " T $sym\$" nm.out; then
              echo "missing exported JNI symbol: $sym" >&2
              cat nm.out >&2
              exit 1
            fi
          done
          echo "All expected JNI symbols are exported."

project:
  name: "weaveffi"
  language: "Rust"
  framework: ""
  description: "CLI tool that generates multi-language FFI bindings (C, C++, Swift, Kotlin/Android, Node.js, WASM, Python, .NET, Dart, Go, Ruby) from a YAML/JSON/TOML API definition, using a stable C ABI."

commands:
  test: "cargo test --workspace"
  lint: "cargo clippy --workspace --all-targets -- -D warnings"
  build: "cargo build --workspace"

rules:
  - "This is a Cargo workspace. Crates live in crates/, samples in samples/, consumer examples in examples/."
  - "Crate structure: weaveffi-ir (IR model + parsing), weaveffi-abi (C ABI runtime), weaveffi-core (Generator trait, Orchestrator, validation, utils), weaveffi-gen-c, weaveffi-gen-cpp, weaveffi-gen-swift, weaveffi-gen-android, weaveffi-gen-node, weaveffi-gen-wasm, weaveffi-gen-python, weaveffi-gen-dotnet, weaveffi-gen-dart, weaveffi-gen-go, weaveffi-gen-ruby (generators), weaveffi-cli (CLI binary named 'weaveffi')."
  - "Use Conventional Commits: feat, fix, refactor, test, docs, chore, ci, build, style, perf. No scopes. Single-line messages only (no body or footer). Imperative mood, no trailing period, max 72 chars. Use '!' after the type for breaking changes (e.g. feat!: ...), not a BREAKING CHANGE footer."
  - "Run cargo fmt --all before committing."
  - "All new code must have tests. Add tests as #[cfg(test)] mod tests at the bottom of existing files, or as integration tests in tests/ directories."
  - "Async functions are supported in the IR and validator (since PRD-v3). Generators may emit async wrappers (Swift async/await, Kotlin suspend, Python async def, .NET Task, Node Promise, etc.). Treat async support as a normal feature, not a forbidden one."
  - "WeaveFFI is pre-1.0 and the user has explicitly authorised breaking changes to the IR, the C ABI, the CLI surface, and the configuration file. Do not add backwards-compatibility shims unless the PRD task explicitly requests one."
  - "Use anyhow::Result for fallible functions. Use thiserror for error enums in library crates."
  - "Use camino::Utf8Path instead of std::path::Path."
  - "IR types must derive Debug, Clone, PartialEq, Eq, Serialize, Deserialize."
  - "Each generator implements the Generator trait (name() -> &str, generate(&self, &Api, &Utf8Path) -> Result<()>, plus optional generate_with_config / generate_with_templates / output_files / output_files_with_config / capabilities) from weaveffi_core::codegen."
  - "Generated foreign language code must be valid and compilable in the target language. Where possible, add tests that string-grep the output for required tokens (function names, keywords, type names) instead of full snapshot matching, so cosmetic changes do not break tests."
  - "The C ABI naming convention is weaveffi_{module}_{function} for functions, customisable via the c_prefix GeneratorConfig field. When wiring c_prefix support, every generator that references the C library or header by name (Swift modulemap, Node binding.gyp, Dart DynamicLibrary.open, Go cgo, Ruby ffi_lib, WASM wasm.X, .NET DllImport, Android System.loadLibrary) must use the configured prefix, not a hardcoded 'weaveffi'."
  - "Keep changes focused. Only modify files directly related to the task. Do not refactor unrelated code."
  - "New generator crates may be created when the PRD explicitly instructs it. Follow existing crate patterns (Cargo.toml metadata, workspace dependencies, Generator trait)."
  - "workspace.lints.rust has unsafe_code = deny. Crates that need unsafe (weaveffi-abi, samples/calculator, samples/contacts, samples/inventory, samples/async-demo, samples/events, samples/node-addon) have #![allow(unsafe_code)]. Any new sample crate with a cdylib lib that implements the C ABI also needs this allow."

boundaries:
  never_touch:
    - "plans/**"
    - ".github/**"
    - "LICENSE-*"
    - ".ralphy/**"

capabilities:
  browser: "false"

project:
  name: "weaveffi"
  language: "Rust"
  framework: ""
  description: "CLI tool that generates multi-language FFI bindings (C, C++, Swift, Kotlin/Android, Node.js, WASM, Python, .NET, Dart, Go, Ruby) from a YAML/JSON/TOML API definition, using a stable C ABI."

commands:
  test: "cargo test --workspace"
  lint: "cargo clippy --workspace --all-targets -- -D warnings"
  build: "cargo build --workspace"

rules:
  - "This is a Cargo workspace. Crates live in crates/, samples in samples/ (calculator, contacts, inventory, async-demo, events, node-addon, plus any new ones added by the PRD), consumer examples in examples/ (c, cpp, dart, go, ruby, swift, android, node, python, dotnet, wasm)."
  - "Crate structure: weaveffi-ir (IR model + parsing), weaveffi-abi (C ABI runtime), weaveffi-core (Generator trait, Orchestrator, validation, utils, templates), weaveffi-gen-c, weaveffi-gen-cpp, weaveffi-gen-swift, weaveffi-gen-android, weaveffi-gen-node, weaveffi-gen-wasm, weaveffi-gen-python, weaveffi-gen-dotnet, weaveffi-gen-dart, weaveffi-gen-go, weaveffi-gen-ruby (generators), weaveffi-cli (CLI binary named 'weaveffi'). Additional non-published crates such as weaveffi-fuzz may be created by the PRD."
  - "Use Conventional Commits: feat, fix, refactor, test, docs, chore, ci, build, style, perf. No scopes. Single-line messages only (no body or footer). Imperative mood, no trailing period, max 72 chars. Use '!' after the type for breaking changes (e.g. feat!: ...), not a BREAKING CHANGE footer."
  - "Run cargo fmt --all before committing."
  - "All new code must have tests. Add tests as #[cfg(test)] mod tests at the bottom of existing files, or as integration tests in tests/ directories."
  - "Async functions (async: true), cancellable functions, listeners, callbacks (module-level callbacks/listeners definitions), iterators (iter<T>), typed handles (handle<T>), borrowed types (&str, &[u8]), nested modules, and cross-module type references are all fully supported and pass validation. Do not re-add validator rejections for these features."
  - "Use anyhow::Result (or color-eyre::eyre::Result in the CLI) for fallible functions. Use thiserror for error enums in library crates."
  - "Use camino::Utf8Path instead of std::path::Path."
  - "IR types must derive Debug, Clone, PartialEq, Serialize, Deserialize. Eq is derived where possible (some IR types contain f64 or serde_yaml::Value and intentionally omit Eq)."
  - "Each generator implements the Generator trait (name() -> &str, generate, generate_with_config, generate_with_templates, output_files, output_files_with_config) from weaveffi_core::codegen."
  - "Generated foreign-language code must be valid and compilable in the target language. Where the PRD requires it, prove correctness by compiling and running the generated bindings against a real cdylib in CI."
  - "The C ABI naming convention is {c_prefix}_{module}_{function} for functions, defaulting to c_prefix='weaveffi'. When the c_prefix configuration is set, the entire C output (including weaveffi-abi runtime symbol references) must use that prefix consistently."
  - "Schema versioning: CURRENT_SCHEMA_VERSION lives in crates/weaveffi-ir/src/ir.rs. When changing it, update every sample IDL, the weaveffi new template, the README quickstart, the getting-started doc, and add migration code in cmd_upgrade. SUPPORTED_VERSIONS must list every version the upgrader can read."
  - "Keep changes focused. Only modify files directly related to the task. Do not refactor unrelated code."
  - "New generator crates may be created when the PRD explicitly instructs it. Follow existing crate patterns (Cargo.toml metadata, workspace dependencies, Generator trait)."
  - "workspace.lints.rust has unsafe_code = deny. Crates that need unsafe (weaveffi-abi, every samples/* crate that exposes a cdylib, any fuzz crate, and scaffold output) have #![allow(unsafe_code)] at the top of their main source file."
  - "Snapshot tests (cargo-insta) are the primary defense against generator regressions. When a snapshot test fails, run cargo insta review locally and commit the .snap diff together with the change that caused it."
  - "Releases are fully automated by semantic-release on merge to main. Do NOT manually edit CHANGELOG.md, .releaserc.json, package.json, package-lock.json, scripts/update-cargo-versions.sh, or version fields in any Cargo.toml — those are managed by the release pipeline. The PRD will tell you when to edit scripts/publish-crates.sh (e.g., to add a newly published crate to the dependency-ordered publish list)."
  - "GitHub Actions workflows: ci.yml may be modified and new workflow files (quality.yml, fuzz.yml, bench.yml, etc.) may be added when the PRD instructs. Do NOT modify release.yml, pr-lint.yml, or docs.yml — those are pipeline files locked off in boundaries.never_touch."

boundaries:
  never_touch:
    - "plans/**"
    - "LICENSE-*"
    - ".ralphy/**"
    - "weaveffi.schema.json"
    - "CHANGELOG.md"
    - ".releaserc.json"
    - "package.json"
    - "package-lock.json"
    - "scripts/update-cargo-versions.sh"
    - ".github/workflows/release.yml"
    - ".github/workflows/pr-lint.yml"
    - ".github/workflows/docs.yml"

capabilities:
  browser: "false"

version: "0.5.0"
modules:
  - name: contacts
    enums:
      - name: ContactType
        variants:
          - name: Personal
            value: 0
          - name: Work
            value: 1
          - name: Other
            value: 2
    structs:
      - name: Contact
        fields:
          - name: id
            type: i64
          - name: first_name
            type: string
          - name: last_name
            type: string
          - name: email
            type: "string?"
          - name: contact_type
            type: ContactType
    errors:
      name: ContactsError
      codes:
        - { name: InvalidName, code: 1, message: "name must not be empty" }
        - { name: NotFound, code: 2, message: "contact not found" }
    interfaces:
      - name: ContactBook
        doc: An in-memory address book owning its contacts
        constructors:
          - name: new
            params: []
        methods:
          - name: add
            params:
              - name: first_name
                type: string
              - name: last_name
                type: string
              - name: email
                type: "string?"
              - name: contact_type
                type: ContactType
            return: Contact
            throws: true
          - name: get
            params:
              - name: id
                type: i64
            return: Contact
            throws: true
          - name: list
            params: []
            return: "[Contact]"
          - name: remove
            params:
              - name: id
                type: i64
            return: bool
          - name: count
            params: []
            return: i32

version: "0.5.0"
modules:
  - name: products
    enums:
      - name: Category
        variants:
          - name: Electronics
            value: 0
          - name: Clothing
            value: 1
          - name: Food
            value: 2
          - name: Books
            value: 3
    structs:
      - name: Product
        fields:
          - name: id
            type: i64
          - name: name
            type: string
          - name: description
            type: "string?"
          - name: price
            type: f64
          - name: category
            type: Category
          - name: tags
            type: "[string]"
    errors:
      name: ProductsError
      codes:
        - { name: InvalidPrice, code: 1, message: "price must be positive" }
        - { name: ProductNotFound, code: 2, message: "product not found" }
    interfaces:
      - name: Catalog
        doc: A product catalog owning its products
        constructors:
          - name: new
            params: []
        methods:
          - name: add_product
            params:
              - name: name
                type: string
              - name: price
                type: f64
              - name: category
                type: Category
            return: Product
            throws: true
          - name: get_product
            params:
              - name: id
                type: i64
            return: Product
            throws: true
          - name: search
            params:
              - name: category
                type: Category
            return: "[Product]"
          - name: update_price
            params:
              - name: id
                type: i64
              - name: price
                type: f64
            return: bool
            throws: true
          - name: remove
            params:
              - name: id
                type: i64
            return: bool
  - name: orders
    structs:
      - name: OrderItem
        fields:
          - name: product_id
            type: i64
          - name: quantity
            type: i32
          - name: unit_price
            type: f64
      - name: Order
        fields:
          - name: id
            type: i64
          - name: items
            type: "[OrderItem]"
          - name: total
            type: f64
          - name: status
            type: string
    errors:
      name: OrdersError
      codes:
        - { name: OrderNotFound, code: 1, message: "order not found" }
        - { name: EmptyOrder, code: 2, message: "order must contain at least one item" }
    functions:
      - name: create_order
        params:
          - name: items
            type: "[OrderItem]"
        return: i64
        throws: true
      - name: get_order
        params:
          - name: id
            type: i64
        return: Order
        throws: true
      - name: cancel_order
        params:
          - name: id
            type: i64
        return: bool
      - name: add_product_to_order
        params:
          - name: order_id
            type: i64
          - name: product
            type: Product
        return: bool

version: "0.4.0"
package:
  name: calculator
  version: "1.0.0"
  description: Arithmetic helpers exposed across every WeaveFFI target language.
  license: MIT
  authors:
    - WeaveFoundry <hello@weavefoundry.dev>
  homepage: https://github.com/weavefoundry/weaveffi
  repository: https://github.com/weavefoundry/weaveffi
modules:
  - name: calculator
    functions:
      - name: add
        doc: Add two integers
        params:
          - { name: a, type: i32 }
          - { name: b, type: i32 }
        return: i32
      - name: mul
        doc: Multiply two integers
        params:
          - { name: a, type: i32 }
          - { name: b, type: i32 }
        return: i32
      - name: div
        doc: Divide two integers
        params:
          - { name: a, type: i32 }
          - { name: b, type: i32 }
        return: i32
      - name: echo
        doc: Echo a string back
        params:
          - { name: s, type: string }
        return: string

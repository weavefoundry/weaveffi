version: "0.3.0"
package:
  name: events
  version: "1.0.0"
  description: Callback and listener-based event subscription example.
  license: MIT
  authors:
    - WeaveFoundry <hello@weavefoundry.dev>
  homepage: https://github.com/weavefoundry/weaveffi
  repository: https://github.com/weavefoundry/weaveffi
modules:
  - name: events
    callbacks:
      - name: OnMessage
        params:
          - { name: message, type: string }
    listeners:
      - name: message_listener
        event_callback: OnMessage
    functions:
      - name: send_message
        doc: Send a message, triggering the OnMessage callback
        params:
          - { name: text, type: string }
      - name: get_messages
        doc: Return an iterator over all sent messages
        params: []
        return: "iter<string>"
generators:
  # The wasm target cannot deliver producer-initiated callbacks/listeners
  # (single-threaded, no producer thread); opt in to generating the rest of
  # the surface — message_listener becomes an explicit throwing stub.
  wasm:
    allow_unsupported: true

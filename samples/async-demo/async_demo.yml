version: "0.3.0"
package:
  name: async-demo
  version: "1.0.0"
  description: Async/await and cancellation demo across WeaveFFI's async-capable targets.
  license: MIT
  authors:
    - WeaveFoundry <hello@weavefoundry.dev>
  homepage: https://github.com/weavefoundry/weaveffi
  repository: https://github.com/weavefoundry/weaveffi
modules:
  - name: tasks
    structs:
      - name: TaskResult
        fields:
          - { name: id, type: i64 }
          - { name: value, type: string }
          - { name: success, type: bool }
    functions:
      - name: run_task
        params:
          - { name: name, type: string }
        return: TaskResult
        async: true
      - name: run_batch
        params:
          - { name: names, type: "[string]" }
        return: "[TaskResult]"
        async: true
      - name: cancel_task
        params:
          - { name: id, type: i64 }
        return: bool
      - name: run_n_tasks
        params:
          - { name: n, type: i32 }
        return: i32
        async: true
      - name: active_callbacks
        params: []
        return: i64

version: "0.3.0"
modules:
  - name: tasks
    structs:
      - name: TaskResult
        fields:
          - { name: id, type: i64 }
          - { name: value, type: string }
          - { name: success, type: bool }
    functions:
      - name: run_task
        params:
          - { name: name, type: string }
        return: TaskResult
        async: true
      - name: run_batch
        params:
          - { name: names, type: "[string]" }
        return: "[TaskResult]"
        async: true
      - name: cancel_task
        params:
          - { name: id, type: i64 }
        return: bool
      - name: run_n_tasks
        params:
          - { name: n, type: i32 }
        return: i32
        async: true
      - name: active_callbacks
        params: []
        return: i64

version: "0.5.0"
package:
  name: contacts
  version: "1.0.0"
  description: A small contacts book API demonstrating interfaces, enums, and typed errors.
  license: MIT
  authors:
    - WeaveFoundry <hello@weavefoundry.dev>
  homepage: https://github.com/weavefoundry/weaveffi
  repository: https://github.com/weavefoundry/weaveffi
modules:
  - name: contacts
    enums:
      - name: ContactType
        variants:
          - name: Personal
            value: 0
          - name: Work
            value: 1
          - name: Other
            value: 2
    structs:
      - name: Contact
        fields:
          - name: id
            type: i64
          - name: first_name
            type: string
          - name: last_name
            type: string
          - name: email
            type: "string?"
          - name: contact_type
            type: ContactType
    errors:
      name: ContactsError
      codes:
        - { name: InvalidName, code: 1, message: "name must not be empty" }
        - { name: NotFound, code: 2, message: "contact not found" }
    interfaces:
      - name: ContactBook
        doc: An in-memory address book owning its contacts
        constructors:
          - name: new
            params: []
        methods:
          - name: add
            doc: Add a contact, returning the stored record with its assigned id
            params:
              - name: first_name
                type: string
              - name: last_name
                type: string
              - name: email
                type: "string?"
              - name: contact_type
                type: ContactType
            return: Contact
            throws: true
          - name: get
            doc: Look up a contact by id
            params:
              - name: id
                type: i64
            return: Contact
            throws: true
          - name: list
            doc: List every stored contact
            params: []
            return: "[Contact]"
          - name: remove
            doc: Remove a contact by id, returning whether it existed
            params:
              - name: id
                type: i64
            return: bool
          - name: count
            doc: Count the stored contacts
            params: []
            return: i32
